<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Shortener</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <main class="container">
    <h1>URL Shortener</h1>
    <p class="subtitle">Paste a long link and get a short one back.</p>

    <form id="shorten-form">
      <label for="url-input">Long URL</label>
      <input
        id="url-input"
        type="url"
        placeholder="https://example.com/very/long/path"
        required
      />
      <button type="submit" id="submit-btn">Shorten</button>
    </form>

    <p id="error" class="message error" hidden></p>

    <section id="result" class="result" hidden>
      <p class="result-label">Your short link</p>
      <a id="short-url" href="#" target="_blank" rel="noopener noreferrer"></a>
      <button type="button" id="copy-btn">Copy</button>
    </section>
  </main>
  <script src="/js/app.js"></script>
</body>
</html>
